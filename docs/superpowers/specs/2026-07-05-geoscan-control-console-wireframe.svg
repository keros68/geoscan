<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1024" viewBox="0 0 1440 1024">
  <defs>
    <style>
      .bg { fill: #f6f8fa; }
      .surface { fill: #ffffff; }
      .side { fill: #edf2f4; }
      .panel { fill: #ffffff; stroke: #d8e0e7; stroke-width: 1.5; }
      .soft { fill: #f8fafb; stroke: #d8e0e7; stroke-width: 1.2; }
      .active { fill: #e6f1ec; stroke: #2f6b4f; stroke-width: 1.5; }
      .blue { fill: #e8f1fb; stroke: #2563a8; stroke-width: 1.4; }
      .warn { fill: #fff6e6; stroke: #b7791f; stroke-width: 1.4; }
      .danger { fill: #fff0ef; stroke: #b42318; stroke-width: 1.4; }
      .ink { fill: #17202a; font-family: "Microsoft YaHei UI", "Segoe UI", Arial, sans-serif; }
      .muted { fill: #5d6b78; font-family: "Microsoft YaHei UI", "Segoe UI", Arial, sans-serif; }
      .title { font-size: 28px; font-weight: 700; }
      .h2 { font-size: 20px; font-weight: 700; }
      .label { font-size: 15px; font-weight: 600; }
      .small { font-size: 13px; }
      .tiny { font-size: 12px; }
      .mono { font-family: "Cascadia Mono", "Consolas", monospace; }
      .shadow { filter: drop-shadow(0 10px 22px rgba(23, 32, 42, 0.08)); }
    </style>
  </defs>

  <rect class="bg" width="1440" height="1024"/>

  <text x="48" y="54" class="ink title">GeoScan Control Console - 低保真结构示意</text>
  <text x="48" y="80" class="muted small">重点：左侧导航 + 中间任务配置 + 右侧运行监控；阶段轨道是产品识别点。</text>

  <!-- Top bar -->
  <rect x="40" y="104" width="1360" height="64" rx="10" class="surface shadow"/>
  <text x="68" y="144" class="ink h2">GeoScan</text>
  <text x="176" y="144" class="muted small">当前工作区：E:\mapgiswork\...</text>
  <rect x="1076" y="120" width="142" height="32" rx="16" class="active"/>
  <text x="1096" y="142" class="ink small">环境可运行</text>
  <rect x="1234" y="120" width="138" height="32" rx="16" class="soft"/>
  <text x="1256" y="142" class="muted small">检查更新</text>

  <!-- Sidebar -->
  <rect x="40" y="188" width="210" height="788" rx="14" class="side"/>
  <text x="68" y="228" class="ink h2">导航</text>
  <rect x="60" y="258" width="170" height="44" rx="10" class="active"/>
  <text x="84" y="286" class="ink label">单张运行</text>
  <rect x="60" y="314" width="170" height="44" rx="10" class="soft"/>
  <text x="84" y="342" class="muted label">批量运行</text>
  <rect x="60" y="370" width="170" height="44" rx="10" class="soft"/>
  <text x="84" y="398" class="muted label">任务记录</text>
  <rect x="60" y="426" width="170" height="44" rx="10" class="soft"/>
  <text x="84" y="454" class="muted label">设置</text>
  <rect x="60" y="482" width="170" height="44" rx="10" class="soft"/>
  <text x="84" y="510" class="muted label">AI 接入</text>
  <rect x="60" y="538" width="170" height="44" rx="10" class="soft"/>
  <text x="84" y="566" class="muted label">更新</text>
  <line x1="60" y1="628" x2="230" y2="628" stroke="#d8e0e7" stroke-width="1"/>
  <text x="68" y="664" class="muted small">模式</text>
  <rect x="68" y="682" width="72" height="32" rx="16" class="active"/>
  <text x="88" y="703" class="ink tiny">新手</text>
  <rect x="148" y="682" width="72" height="32" rx="16" class="soft"/>
  <text x="168" y="703" class="muted tiny">专家</text>

  <!-- Main workspace -->
  <rect x="270" y="188" width="690" height="788" rx="14" class="surface shadow"/>
  <text x="302" y="232" class="ink h2">单张运行</text>
  <text x="302" y="258" class="muted small">选择输入图，确认输出位置，然后开始生成可核查候选。</text>

  <rect x="302" y="292" width="626" height="104" rx="12" class="blue"/>
  <text x="326" y="326" class="ink label">输入图片</text>
  <text x="326" y="354" class="muted small mono">E:\mapgiswork\source\t01_0006.tif</text>
  <rect x="788" y="326" width="112" height="36" rx="8" class="surface"/>
  <text x="820" y="349" class="ink small">选择</text>

  <rect x="302" y="418" width="300" height="82" rx="12" class="soft"/>
  <text x="326" y="450" class="ink label">Map ID</text>
  <text x="326" y="478" class="muted small mono">T01_0006</text>
  <rect x="628" y="418" width="300" height="82" rx="12" class="soft"/>
  <text x="652" y="450" class="ink label">输出文件夹</text>
  <text x="652" y="478" class="muted small mono">T01_0006_P</text>

  <text x="302" y="544" class="ink h2">新手参数</text>
  <rect x="302" y="568" width="194" height="74" rx="12" class="soft"/>
  <text x="326" y="598" class="ink label">输入调平</text>
  <text x="326" y="622" class="muted small">off / auto / force</text>
  <rect x="518" y="568" width="194" height="74" rx="12" class="soft"/>
  <text x="542" y="598" class="ink label">增强底图</text>
  <text x="542" y="622" class="muted small">none / standard</text>
  <rect x="734" y="568" width="194" height="74" rx="12" class="soft"/>
  <text x="758" y="598" class="ink label">转换模式</text>
  <text x="758" y="622" class="muted small">cli / prepare / none</text>

  <rect x="302" y="674" width="626" height="74" rx="12" class="soft"/>
  <text x="326" y="706" class="ink label">专家参数（折叠）</text>
  <text x="326" y="730" class="muted small">线引擎、线修复、目标 WL/WT/WP、OCR、超时、fresh rerun、AI 增强...</text>

  <rect x="302" y="790" width="170" height="52" rx="12" fill="#2f6b4f"/>
  <text x="350" y="823" fill="#ffffff" font-family="Microsoft YaHei UI, Segoe UI, Arial" font-size="16" font-weight="700">开始运行</text>
  <rect x="490" y="790" width="142" height="52" rx="12" class="soft"/>
  <text x="528" y="823" class="ink label">安全停止</text>
  <rect x="650" y="790" width="170" height="52" rx="12" class="soft"/>
  <text x="696" y="823" class="ink label">打开输出</text>

  <rect x="302" y="872" width="626" height="72" rx="12" class="warn"/>
  <text x="326" y="904" class="ink label">提示</text>
  <text x="326" y="928" class="muted small">候选仍需人工核查；程序不写 checked=yes，不自动确认地质内容。</text>

  <!-- Run monitor -->
  <rect x="984" y="188" width="416" height="788" rx="14" class="surface shadow"/>
  <text x="1016" y="232" class="ink h2">运行监控</text>
  <text x="1016" y="258" class="muted small">先预检，再运行；失败时直接显示恢复路径。</text>

  <rect x="1016" y="292" width="352" height="86" rx="12" class="active"/>
  <text x="1040" y="326" class="ink label">环境预检</text>
  <text x="1040" y="354" class="muted small">SECTION / W60 / ogr2ogr 已找到；密码狗运行中。</text>

  <text x="1016" y="424" class="ink h2">阶段轨道</text>
  <line x1="1040" y1="468" x2="1040" y2="716" stroke="#c9d4de" stroke-width="4" stroke-linecap="round"/>

  <circle cx="1040" cy="468" r="13" fill="#2f6b4f"/>
  <text x="1068" y="474" class="ink label">00 输入冻结</text>
  <text x="1068" y="494" class="muted tiny">完成：像素单位 TIFF</text>

  <circle cx="1040" cy="520" r="13" fill="#2f6b4f"/>
  <text x="1068" y="526" class="ink label">04 线候选</text>
  <text x="1068" y="546" class="muted tiny">完成：120 条候选</text>

  <circle cx="1040" cy="572" r="13" fill="#2563a8"/>
  <text x="1068" y="578" class="ink label">05 文字候选</text>
  <text x="1068" y="598" class="muted tiny">运行中：OCR / fallback</text>

  <circle cx="1040" cy="624" r="13" fill="#c9d4de"/>
  <text x="1068" y="630" class="muted label">DXF 导出</text>
  <text x="1068" y="650" class="muted tiny">等待上一步</text>

  <circle cx="1040" cy="676" r="13" fill="#c9d4de"/>
  <text x="1068" y="682" class="muted label">SECTION / W60</text>
  <text x="1068" y="702" class="muted tiny">等待转换</text>

  <circle cx="1040" cy="728" r="13" fill="#c9d4de"/>
  <text x="1068" y="734" class="muted label">交付包</text>
  <text x="1068" y="754" class="muted tiny">MAPGIS_LOAD_READY</text>

  <rect x="1016" y="786" width="352" height="92" rx="12" class="soft"/>
  <text x="1040" y="818" class="ink label">实时日志</text>
  <text x="1040" y="842" class="muted tiny mono">[running] 05_TEXT_WORKFLOW...</text>
  <text x="1040" y="862" class="muted tiny mono">[info] 输出目录: T01_0006_P</text>

  <rect x="1016" y="900" width="168" height="44" rx="10" class="soft"/>
  <text x="1052" y="928" class="ink small">查看报告</text>
  <rect x="1200" y="900" width="168" height="44" rx="10" class="soft"/>
  <text x="1234" y="928" class="ink small">复制日志</text>
</svg>
