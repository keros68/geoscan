name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (public tier only)
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        # pyproject sets pythonpath=src, so no PYTHONPATH needed.
        run: python -m pytest -q
